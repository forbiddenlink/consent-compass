<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>
  
  <!-- Subtle Grid Pattern -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <path d="M0 105H1200M0 210H1200M0 315H1200M0 420H1200M0 525H1200"/>
    <path d="M200 0V630M400 0V630M600 0V630M800 0V630M1000 0V630"/>
  </g>

  <!-- Compass / Radar Graphic -->
  <g transform="translate(600, 315)">
    <circle cx="0" cy="0" r="180" stroke="url(#emeraldGradient)" stroke-width="2" fill="none" opacity="0.2"/>
    <circle cx="0" cy="0" r="120" stroke="url(#emeraldGradient)" stroke-width="2" stroke-dasharray="10 10" fill="none" opacity="0.4"/>
    <circle cx="0" cy="0" r="60" stroke="#34d399" stroke-width="2" fill="none" opacity="0.6"/>
    <circle cx="0" cy="0" r="8" fill="#34d399"/>
    
    <!-- Radar Sweep -->
    <path d="M0 0 L180 0 A180 180 0 0 1 127.28 127.28 Z" fill="url(#sweepGradient)" opacity="0.3"/>
    
    <!-- Target Nodes -->
    <circle cx="100" cy="-60" r="6" fill="#fb7185"/> <!-- Rose (finding) -->
    <circle cx="-140" cy="80" r="6" fill="#fbbf24"/> <!-- Amber (warn) -->
    <circle cx="40" cy="140" r="6" fill="#34d399"/>   <!-- Emerald (success) -->
  </g>

  <!-- Typography -->
  <text x="120" y="500" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="72" fill="#ffffff" letter-spacing="-2">Consent Compass</text>
  <text x="120" y="550" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="32" fill="rgba(255,255,255,0.6)">Evidence-first banner compliance scanning.</text>

  <!-- Decorative Badge -->
  <rect x="120" y="100" width="160" height="48" rx="24" fill="rgba(52,211,153,0.1)" stroke="rgba(52,211,153,0.2)"/>
  <text x="200" y="130" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="20" fill="#34d399" text-anchor="middle">v0 Engine</text>

  <defs>
    <linearGradient id="emeraldGradient" x1="-180" y1="-180" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#0a0a0a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sweepGradient" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
